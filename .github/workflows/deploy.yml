name: Deploy MyGreekTax Brain to AWS Lambda

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # Upgraded runner setup target to Node 24
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install Dependencies
      run: |
        npm ci --production

    - name: Package Deployment Archive
      run: |
        zip -r deployment.zip index.js node_modules package.json

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-north-1

    - name: Push Zip to AWS Lambda
      run: |
        aws lambda update-function-code \
          --function-name mygreektax-brain \
          --zip-file fileb://deployment.zip
