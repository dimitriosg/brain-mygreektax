name: Deploy MyGreekTax Brain to AWS Lambda

on:
  push:
    branches:
      - main # Triggers the automation every time you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull down your repository code onto the GitHub virtual runner
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Set up the Node.js runtime environment to install project modules
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-node-version: '20' # Matches your target AWS Lambda runtime

    # 3. Clean install your production dependencies 
    - name: Install Dependencies
      run: |
        npm ci --production

    # 4. Package your orchestration scripts and node_modules into a deployment archive
    - name: Package Deployment Archive
      run: |
        zip -r deployment.zip index.js node_modules package.json

    # 5. Authenticate securely with AWS using project keys
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-north-1 # Deploys directly to Stockholm

    # 6. Upload the new code bundle and refresh the AWS serverless container
    - name: Push Zip to AWS Lambda
      run: |
        aws lambda update-function-code \
          --function-name mygreektax-brain \
          --zip-file fileb://deployment.zip
