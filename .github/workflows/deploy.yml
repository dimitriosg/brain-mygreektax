name: Deploy MyGreekTax Brain to AWS Lambda

on:
  push:
    branches:
      - main

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Initialize Fallback Files
      run: |
        if [ ! -f package.json ]; then
          echo '{"name":"brain","type":"module","dependencies":{"@aws-sdk/client-bedrock-runtime":"^3.0.0","@supabase/supabase-js":"^2.0.0"}}' > package.json
        fi
        if [ ! -f index.js ] && [ ! -f index.mjs ]; then
          echo 'export const handler = async (e) => { return { statusCode: 200, body: "Hello" } };' > index.js
        fi

    - name: Install Dependencies
      run: |
        npm install --production

    - name: Package Deployment Archive
      run: |
        zip -r deployment.zip . -x "*.git*" "*.github*"

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-north-1

    - name: Push Zip to AWS Lambda
      run: |
        aws lambda update-function-code \
          --function-name mygreektax-brain \
          --zip-file fileb://deployment.zip
